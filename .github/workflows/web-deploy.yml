name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'shared/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-web"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          # Remove lockfiles to force fresh install of correct versions
          rm -f package-lock.json web/package-lock.json
          npm install
          # Override vite version (lockfile may resolve to wrong version)
          cd web && npm install vite@4.5.5 @vitejs/plugin-react@3.1.0 --save-dev
          # Remove rolldown that some transitive dep may have pulled in
          rm -rf web/node_modules/rolldown web/node_modules/@rolldown
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmmirror.com

      - name: Build
        run: npm run build

      - name: Upload artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
          overwrite: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
