name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'shared/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-web"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          # Delete rolldown after install - it has a known npm bug on linux-x64-gnu
          # where the native binding doesn't install correctly, causing vite build to fail.
          # Vite 4.x uses esbuild as bundler so rolldown is not needed.
          find web/node_modules -name "rolldown" -type d -exec rm -rf {} + 2>/dev/null || true
          find web/node_modules -path "*/@rolldown/*" -exec rm -rf {} + 2>/dev/null || true
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmmirror.com

      - name: Build
        run: npm run build

      - name: Upload artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
          overwrite: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
