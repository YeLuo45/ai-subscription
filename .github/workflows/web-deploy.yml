name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'shared/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-web"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          # Delete lockfiles so ^4.5.5 in web/package.json resolves to 4.5.5
          # (lockfiles pin vite to 8.0.10, which has rolldown baked in and
          # ignores --ignore-scripts for its native binding).
          rm -f package-lock.json web/package-lock.json
          npm install --ignore-scripts
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmmirror.com

      - name: Debug vite build
        run: |
          echo "=== vite version ==="
          cat web/node_modules/vite/package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])"
          echo "=== rolldown package exists? ==="
          ls web/node_modules/rolldown/package.json 2>&1 || echo "NOT FOUND"
          echo "=== @rolldown binding ==="
          ls web/node_modules/@rolldown/binding-linux-x64-gnu/ 2>&1 || echo "NOT FOUND"

      - name: Build
        run: |
          cd web
          npm run build

      - name: Upload artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
          overwrite: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
