  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/',
              updateViaCache: 'none'
            });
            
            console.log('SW registered:', registration.scope, 'version:', registration.active?.scriptURL);
            
            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version available
                    console.log('New SW version available');
                    dispatchEvent(new CustomEvent('sw-update-available'));
                  }
                });
              }
            });
            
            // Handle controller change (new SW activated)
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              console.log('SW controller changed - page may need refresh');
              dispatchEvent(new CustomEvent('sw-controller-change'));
            });
            
          } catch (error) {
            console.log('SW registration failed:', error);
          }
        });
      }
      
      // Online/offline status handling
      window.addEventListener('online', () => {
        console.log('Network: online');
        dispatchEvent(new CustomEvent('network-status-change', { detail: { online: true } }));
      });
      
      window.addEventListener('offline', () => {
        console.log('Network: offline');
        dispatchEvent(new CustomEvent('network-status-change', { detail: { online: false } }));
      });
      
      // Check initial network status
      if (!navigator.onLine) {
        dispatchEvent(new CustomEvent('network-status-change', { detail: { online: false } }));
      }
    </script>
  </body>
